# ORIZALEARN/docker-compose.yml

version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: oriza_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: oriza_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${POSTGRES_URL}

  frontend:
    build:
      context: ./frontOri
      dockerfile: Dockerfile
    container_name: oriza_front
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
